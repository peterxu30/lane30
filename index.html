<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0 user-scalable=no"/>
  <title>Lane 30</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&display=swap">
  <style>
    html {
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    body {
      margin: 0 auto;
      background: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
      user-select: none; /* supported by Chrome and Opera */
      -webkit-user-select: none; /* Safari */
      -khtml-user-select: none; /* Konqueror HTML */
      -moz-user-select: none; /* Firefox */
      -ms-user-select: none; /* Internet Explorer/Edge */
      overscroll-behavior: none;
    }
    #game {
      margin: 0px auto;
      max-height: 100%;
      position: relative;
    }
    canvas {
      background: #222;
      display: block;
      max-width: 100%;
      margin: 0 auto;
      border-radius: 10px;
      touch-action: none;
    }
    .pill {
      background: rgba(255,255,255,0.1);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
    }
    button {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #555;
      color: white;
      margin-left: 10px;
    }
    button:hover { background: #777; }
    #scoreboard {
      margin: 10px auto;
      color: white;
      font-size: .7em;
    }
    table {
      border-collapse: collapse;
      text-align: center;
      margin-left: auto;
      margin-right: auto;
      height: 6.16%;
    }
    th, td {
      border: 1px solid #fff;
      width: 4%;
    }
    #title {
      height: 100%;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
      color: #6979e0;
      font-family: 'Tangerine', cursive;
      font-size: 3.5em;
      margin-top: 5px;
      margin-bottom: 0%;
    }

    /* ── Leaderboard view button ── */

    /* ── Modal overlay ── */
    #lb-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #lb-modal {
      background: #2c2c2c;
      border-radius: 14px;
      padding: 28px 28px 24px;
      width: min(380px, 92vw);
      color: #fff;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    #lb-modal h2 {
      margin: 0 0 6px;
      font-size: 1.4em;
      color: #6979e0;
    }
    #lb-score-text {
      margin: 0 0 18px;
      font-size: 0.9em;
      color: #bbb;
    }
    #lb-name {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid #555;
      background: #1a1a1a;
      color: #fff;
      font-size: 1em;
      box-sizing: border-box;
      outline: none;
    }
    #lb-name:focus { border-color: #6979e0; }
    #lb-status {
      min-height: 1.3em;
      font-size: 0.8em;
      color: #e07070;
      margin: 6px 0 10px;
    }
    #lb-hint {
      min-height: 1.2em;
      font-size: 0.8em;
      color: #888;
      margin: 0 0 10px;
    }
    .lb-btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    /* ── Tabs ── */
    #lb-tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 14px;
    }
    .lb-tab {
      background: #444;
      color: #999;
      padding: 5px 18px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 0.82em;
    }
    .lb-tab.lb-active { background: #6979e0; color: #fff; }
    /* ── Score list ── */
    #lb-list {
      list-style: none;
      padding: 0;
      margin: 0 0 20px;
      text-align: left;
      max-height: 260px;
      overflow-y: auto;
    }
    #lb-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 4px;
      border-bottom: 1px solid #3a3a3a;
      font-size: 0.88em;
    }
    #lb-list .lb-rank { color: #666; width: 22px; flex-shrink: 0; }
    #lb-list .lb-name { flex: 1; }
    #lb-list .lb-pts  { font-weight: bold; color: #6979e0; }
    #lb-list .lb-dim  { color: #666; padding: 14px 0; text-align: center; display: block; }
    /* ── Play Again ── */
    #lb-play-again {
      background: #6979e0;
      color: #fff;
      padding: 10px 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.95em;
    }
    #lb-play-again:hover { background: #7a8af0; }
  </style>
</head>
<body oncontextmenu="return false;">
  <div id="game">
    <div id="title_div">
      <h1 id="title">Lane 30</h1>
    </div>
    <table id="scoreboard">
      <thead>
        <tr>
          <th class="table_title">Frame</th>
          <th colspan="2">1</th>
          <th colspan="2">2</th>
          <th colspan="2">3</th>
          <th colspan="2">4</th>
          <th colspan="2">5</th>
          <th colspan="2">6</th>
          <th colspan="2">7</th>
          <th colspan="2">8</th>
          <th colspan="2">9</th>
          <th colspan="3">10</th>
        </tr>
      </thead>
      <tbody>
        <tr id="rolls">
          <td class="table_title">Score</td>
          <!-- 2 cells per frame (1-9) + 3 for 10th -->
          <td colspan="2"></td><td colspan="2"></td><td colspan="2"></td><td colspan="2"></td>
          <td colspan="2"></td><td colspan="2"></td><td colspan="2"></td><td colspan="2"></td>
          <td colspan="2"></td><td colspan="3"></td>
        </tr>
        <tr id="totals">
          <td class="table_title">Total</td>
          <td colspan="2"></td><td colspan="2"></td><td colspan="2"></td><td colspan="2"></td>
          <td colspan="2"></td><td colspan="2"></td><td colspan="2"></td><td colspan="2"></td>
          <td colspan="2"></td><td colspan="3"></td>
        </tr>
      </tbody>
    </table>
    <canvas id="lane" width="640" height="900"></canvas>

    <script src="main.js" type="module"></script>
  </div>

  <!-- Leaderboard modal -->
  <div id="lb-overlay">
    <div id="lb-modal">

      <!-- Phase 1: submit score -->
      <div id="lb-submit">
        <h2>Game Over</h2>
        <p id="lb-score-text"></p>
        <input id="lb-name" type="text" maxlength="20" placeholder="Your name" autocomplete="off" spellcheck="false" />
        <p id="lb-status"></p>
        <p id="lb-hint"></p>
        <div class="lb-btn-row">
          <button id="lb-save">Save Score</button>
          <button id="lb-skip">Skip</button>
        </div>
      </div>

      <!-- Phase 2: view leaderboard -->
      <div id="lb-board" style="display:none">
        <h2>Leaderboard</h2>
        <div id="lb-tabs">
          <button id="lb-tab-normal" class="lb-tab lb-active">NORMAL</button>
          <button id="lb-tab-miga"   class="lb-tab">MIGA</button>
        </div>
        <ol id="lb-list"></ol>
        <button id="lb-play-again">Play Again</button>
      </div>

    </div>
  </div>
</body>
</html>
